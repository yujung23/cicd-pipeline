spring:
  application:
    name: trade
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: 8080
  shutdown: graceful

binance:
  ws-url: wss://stream.binance.com/ws/btcusdt@trade/ethusdt@trade/xrpusdt@trade

stream:
  buffer-size: 500
  limit-rate: 20

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always